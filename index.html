<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Library</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --text: #e8e8e8;
    --muted: #8a8f98;
    --accent: #5b8cff;
    --border: #262a33;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 40px 20px;
  }
  h1 { font-size: 1.6rem; margin-bottom: 4px; }
  p.sub { color: var(--muted); margin-top: 0; margin-bottom: 24px; }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 24px;
    max-width: 900px;
  }
  #search, #tagFilter {
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 0.95rem;
  }
  #search { flex: 1; min-width: 200px; }
  .viewBtns { display: flex; gap: 6px; margin-left: auto; }
  .viewBtns button {
    padding: 9px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
  }
  .viewBtns button.active {
    color: var(--text);
    border-color: var(--accent);
  }

  #list.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    max-width: 900px;
  }
  #list.list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 700px;
  }
  .book {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-decoration: none;
    color: var(--text);
    display: block;
    transition: border-color 0.15s ease;
  }
  #list.list .book {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
  }
  .book:hover { border-color: var(--accent); }
  .book .title { font-weight: 600; font-size: 0.98rem; margin-bottom: 6px; }
  #list.list .book .title { margin-bottom: 0; }
  .book .tag {
    color: var(--muted);
    font-size: 0.8rem;
    display: inline-block;
  }
  .book .ext {
    color: var(--accent);
    font-size: 0.72rem;
    text-transform: uppercase;
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 5px;
    margin-left: 8px;
  }
  #empty { color: var(--muted); display: none; }
</style>
</head>
<body>

  <h1>My Library</h1>
  <p class="sub">Personal book collection — click a title to open it.</p>

  <div class="controls">
    <input id="search" type="text" placeholder="Search books..." oninput="applyFilters()">
    <select id="tagFilter" onchange="applyFilters()">
      <option value="">All tags</option>
    </select>
    <div class="viewBtns">
      <button id="gridBtn" onclick="setView('grid')">Grid</button>
      <button id="listBtn" onclick="setView('list')">List</button>
    </div>
  </div>

  <div id="list" class="grid"></div>
  <p id="empty">No books found.</p>

  <script>
    let allBooks = [];
    let currentView = localStorage.getItem('view') || 'grid';

    fetch('books.json')
      .then(res => res.json())
      .then(data => {
        allBooks = data;
        populateTags(allBooks);
        setView(currentView);
        renderBooks(allBooks);
      })
      .catch(err => {
        document.getElementById('list').innerHTML =
          '<p style="color:#e88">Could not load books.json — check the file exists and is valid JSON.</p>';
        console.error(err);
      });

    function getExt(filename) {
      return filename.split('.').pop().toLowerCase();
    }

    function populateTags(books) {
      const tags = [...new Set(books.map(b => b.tag).filter(Boolean))];
      const select = document.getElementById('tagFilter');
      tags.forEach(tag => {
        const opt = document.createElement('option');
        opt.value = tag;
        opt.textContent = tag;
        select.appendChild(opt);
      });
    }

    function setView(view) {
      currentView = view;
      localStorage.setItem('view', view);
      const list = document.getElementById('list');
      list.className = view;
      document.getElementById('gridBtn').classList.toggle('active', view === 'grid');
      document.getElementById('listBtn').classList.toggle('active', view === 'list');
    }

    function renderBooks(books) {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      list.innerHTML = '';

      if (books.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      books.forEach(book => {
        const ext = getExt(book.file);
        const a = document.createElement('a');
        a.className = 'book';

        // txt and epub open in the in-site reader (real dark mode, reflowed text)
        // pdf also opens in the in-site reader (rendered + invertible dark mode)
        a.href = `reader.html?file=${encodeURIComponent(book.file)}&title=${encodeURIComponent(book.title)}`;

        a.innerHTML = `
          <div class="title">${book.title} <span class="ext">${ext}</span></div>
          <div class="tag">${book.tag || ''}</div>
        `;
        list.appendChild(a);
      });
    }

    function applyFilters() {
      const q = document.getElementById('search').value.toLowerCase();
      const tag = document.getElementById('tagFilter').value;
      const filtered = allBooks.filter(b => {
        const matchesText = b.title.toLowerCase().includes(q) ||
                             (b.tag || '').toLowerCase().includes(q);
        const matchesTag = !tag || b.tag === tag;
        return matchesText && matchesTag;
      });
      renderBooks(filtered);
    }
  </script>

</body>
</html>
